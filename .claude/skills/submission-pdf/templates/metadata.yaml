title: "Singulab — 集団構成パラメータと創発の関係を観察する"
subtitle: "LLM 多体シミュレーションによる仮説検証レポート"
author: "Kai、タコ"
contact: "https://github.com/Kai-85-git/singulab"
date: "2026-05-07"
version: "1.0"
language: "ja-JP"
tone: "技術ブログ調"
audience: "ハッカソン審査員"

pandoc:
  pdf_engine: xelatex
  toc: true
  toc_depth: 2
  number_sections: true
  geometry:
    - "margin=22mm"
    - "headheight=15pt"
  fontsize: "11pt"
  # Latin fonts (via fontspec)
  mainfont: "Yu Mincho"
  sansfont: "Yu Gothic UI"
  monofont: "Consolas"
  # CJK fonts (Yu series ships with Windows 10/11; works with xdvipdfmx).
  # To upgrade to Noto JP, install static (non-variable) variants and edit
  # build_pdf.ps1.
  linkcolor: "MidnightBlue"
  urlcolor: "MidnightBlue"
  toccolor: "black"

theme:
  primary: "#0F4C5C"
  accent: "#E36414"
  rule: "#5F0F40"

chapters:
  - id: "00"
    file: "00_表紙.md"
    title: "表紙"
